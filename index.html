main{padding:16px}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px}
.card-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600}
.card-value{font-size:22px;font-weight:900;margin-top:4px}
.card-sub{font-size:10px;color:var(--muted);margin-top:2px}
.progress-track{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
.alert-card{background:rgba(240,192,64,.08);border:1px solid var(--accent);border-radius:8px;padding:12px 16px;margin-bottom:12px;display:flex;gap:12px;align-items:center;font-size:13px}

input[type="text"],input[type="number"],input[type="date"]{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--fg);font-size:14px;outline:none;box-sizing:border-box;font-family:inherit}
select{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--fg);font-size:14px;outline:none;box-sizing:border-box;font-family:inherit}
.label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px;display:block}
.label-sm{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:2px;display:block}

const SUPPLEMENTS=[
  {id:'creatine',name:'Creatine 5g',time:'Morning fasted'},
  {id:'greens',name:'Greens Drink',time:'Morning fasted'},
  {id:'kefir',name:'Kefir (small glass)',time:'Morning fasted'},

const todayStr=()=>new Date().toISOString().slice(0,10);
const timeStr=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const dayOfWeek=()=>new Date().getDay();

// ─── State ───

    dayTargets:{lift:2300,hit:1700,elliptical:1500,rest:1400,restFlex:1300}
  },

};
// Backward compat
if(!data.cardio)data.cardio=[];
if(!data.sleep)data.sleep=[];
if(!data.supplements)data.supplements={};
if(!data.sauna)data.sauna=[];
if(!data.phase)data.phase=1;

let currentTab='dashboard';
let workoutExercises=[];
let foodResult=null;
function save(){store.set('mentzer-data',data)}

// ─── Helpers ───
function getCurrentWorkouts(){return PHASES[data.phase].workouts}
function getCurrentPhase(){return PHASES[data.phase]}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else if(k==='value')el.value=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return el;
}
function secTitle(t){return h('h2',{className:'section-title'},t)}
function statCard(label,value,target,unit,color){
  const pct=target?Math.min(100,Math.round((value/target)*100)):0;
  const c=h('div',{className:'card'},[
    h('div',{className:'card-label'},label),
    h('div',{className:'card-value',style:{color}},Math.round(value),h('span',{style:{fontSize:'12px',fontWeight:'400'}},unit)),
  ]);
  if(target>0){
    c.appendChild(h('div',{className:'progress-track'},[h('div',{className:'progress-fill',style:{width:pct+'%',background:color}})]));
    c.appendChild(h('div',{className:'card-sub'},pct+'% of '+target+unit));
  }
  return c;
}
function getTodaySchedule(){return SCHEDULE[dayOfWeek()]}

// ─── Navigation ───
const tabs=[
  {id:'dashboard',label:'Dash',icon:'◈'},{id:'workout',label:'Train',icon:'⚡'},
  {id:'nutrition',label:'Food',icon:'◉'},{id:'body',label:'Body',icon:'△'},
  {id:'daily',label:'Daily',icon:'✓'},{id:'coach',label:'Coach',icon:'✦'},

];

function renderNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  tabs.forEach(t=>{
    nav.appendChild(h('button',{className:'nav-btn'+(currentTab===t.id?' active':''),onClick:()=>{currentTab=t.id;render();}},[
      h('span',{className:'nav-icon'},t.icon),h('span',{className:'nav-label'},t.label)

}

// ─── Dashboard ───
function renderDashboard(){
  const t=todayStr();const sched=getTodaySchedule();const dow=dayOfWeek();
  const meals=data.meals[t]||[];
  const totals=meals.reduce((a,m)=>({cal:a.cal+(m.cal||0),protein:a.protein+(m.protein||0),carbs:a.carbs+(m.carbs||0),fat:a.fat+(m.fat||0)}),{cal:0,protein:0,carbs:0,fat:0});
  const lastW=data.bodyWeight.length?data.bodyWeight[data.bodyWeight.length-1]:null;
  const lastS=data.soreness.length?data.soreness[data.soreness.length-1]:null;
  const lastSl=data.sleep.length?data.sleep[data.sleep.length-1]:null;
  const lastWk=data.workouts.length?data.workouts[data.workouts.length-1]:null;
  const daysSinceLift=lastWk?Math.floor((new Date(t)-new Date(lastWk.date))/864e5):null;
  const todayC=data.cardio.filter(c=>c.date===t);
  const todaySups=data.supplements[t]||[];

  // Next workout in current phase
  const workouts=Object.keys(getCurrentWorkouts());
  const lastIdx=lastWk?workouts.indexOf(lastWk.split):-1;
  const nextSplit=lastIdx>=0?workouts[(lastIdx+1)%workouts.length]:workouts[0];

  const frag=document.createDocumentFragment();

  // Current phase indicator
  const phaseCard=h('div',{className:'card',style:{borderColor:'var(--accent)',background:'rgba(240,192,64,0.04)'}});
  phaseCard.appendChild(h('div',{className:'flex justify-between items-center'},[
    h('div',null,[
      h('span',{className:'phase-badge'},getCurrentPhase().short),
      h('span',{style:{fontSize:'13px',fontWeight:'700',marginLeft:'8px',color:'var(--fg)'}},getCurrentPhase().name.replace(/^Phase \d+ — /,''))
    ]),
  ]));
  phaseCard.appendChild(h('div',{style:{fontSize:'11px',color:'var(--muted)',marginTop:'6px',lineHeight:'1.5'}},getCurrentPhase().description));
  frag.appendChild(phaseCard);

  // Today's schedule card
  const schedCard=h('div',{className:'card',style:{borderColor:sched.type==='lift'?'var(--accent)':sched.type==='hit-or-elliptical'?'var(--green)':'var(--border)'}});
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function initExercises(split){
  const workouts=getCurrentWorkouts();
  const prev=[...data.workouts].reverse().find(w=>w.split===split);
  workoutExercises=(workouts[split]||[]).map(e=>{
    const pe=prev?.exercises?.find(x=>x.name===e.name);
    return{...e,weight:pe?.weight||'',reps:pe?.reps||'',toFailure:false};
  });
}

let currentSplit=(()=>{
  const workouts=Object.keys(getCurrentWorkouts());
  const last=data.workouts.length?data.workouts[data.workouts.length-1]:null;
  if(!last||!workouts.includes(last.split))return workouts[0];
  return workouts[(workouts.indexOf(last.split)+1)%workouts.length];
})();

async function searchFood(){
  const q=(document.getElementById('food-query')?.value||'').toLowerCase().trim();
  if(!q)return;
  const match=Object.entries(FOOD_DB).find(([k])=>k.includes(q)||q.includes(k));
  if(match){foodResult={name:match[0],...match[1],source:'database'};showFoodResult();return;}
  const rd=document.getElementById('food-result');
  if(rd)rd.innerHTML='<div style="color:var(--muted);padding:12px;text-align:center">AI estimating macros...</div>';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:'Estimate macros for: "'+q+'". Respond ONLY with JSON, no markdown: {"name":"food","cal":number,"protein":number,"carbs":number,"fat":number,"per":"serving desc"}. Be accurate, use brand nutrition facts if known. Prefer primal/whole food serving sizes.'}]
      })
    });
    const d=await resp.json();
    const text=d.content?.map(c=>c.text||'').join('')||'';
    foodResult={...JSON.parse(text.replace(/```json|```/g,'').trim()),source:'ai-estimate'};
    showFoodResult();
  }catch{
    const rd=document.getElementById('food-result');
    if(rd)rd.innerHTML='<div class="card" style="border-color:var(--red)">Could not estimate. Try being more specific.</div>';
  }
}

function showFoodResult(){
  const rd=document.getElementById('food-result');if(!rd||!foodResult)return;rd.innerHTML='';
  const r=foodResult;const tagBg=r.source==='ai-estimate'?'var(--accent)':'var(--green)';
  rd.appendChild(h('div',{className:'result-card'},[
    h('div',{className:'flex justify-between items-center'},[
      h('strong',{style:{color:'var(--fg)',textTransform:'capitalize'}},r.name),
      h('span',{className:'tag',style:{background:tagBg,color:'#000'}},r.source==='ai-estimate'?'AI':'DB')

  const s2=h('div',{className:'flex-1'});s2.appendChild(h('label',{className:'label-sm'},'Quality'));
  const sq=h('select',{id:'sleep-quality'});['Great','Good','Okay','Poor','Terrible'].forEach(q=>{sq.appendChild(h('option',{value:q},q))});
  s2.appendChild(sq);sr.appendChild(s2);sc.appendChild(sr);
  sc.appendChild(h('input',{type:'text',placeholder:'Notes...',id:'sleep-notes'}));
  sc.appendChild(h('button',{className:'btn-primary',style:{marginTop:'10px',background:'var(--blue)',color:'#0a0a0c'},onClick:()=>{
    const hrs=parseFloat(document.getElementById('sleep-hours')?.value);if(!hrs)return;
    data.sleep=data.sleep.filter(s=>s.date!==todayStr());
    data.sleep.push({date:todayStr(),hours:hrs,quality:document.getElementById('sleep-quality')?.value||'Good',notes:document.getElementById('sleep-notes')?.value||''});
    save();alert('Sleep logged!');render();
  }},'Log Sleep'));
  frag.appendChild(sc);

  if(data.sleep.length>1){
    const stc=h('div',{className:'card'});stc.appendChild(h('div',{className:'card-label'},'Sleep Trend'));
    const sb=h('div',{style:{display:'flex',alignItems:'flex-end',gap:'3px',height:'80px',marginTop:'8px'}});
    data.sleep.slice(-14).forEach(s=>{const ht=Math.max(10,(s.hours/10)*70);const col=s.hours>=7?'var(--blue)':s.hours>=5?'var(--orange)':'var(--red)';
      sb.appendChild(h('div',{style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}},[h('div',{style:{fontSize:'9px',color:'var(--muted)'}},s.hours+'h'),h('div',{style:{width:'100%',height:ht+'px',background:col,borderRadius:'2px',minWidth:'4px'}})]))});
    stc.appendChild(sb);frag.appendChild(stc);
  }

  // Soreness
  frag.appendChild(secTitle('Log Soreness'));
  const sorc=h('div',{className:'card'});
  const sorVal=h('span',{style:{fontSize:'24px',fontWeight:'900',color:'var(--orange)'},id:'sore-val'},'5/10');
  sorc.appendChild(h('div',{className:'flex justify-between items-center mb-8'},[h('span',{className:'label'},'Level'),sorVal]));
  const slider=h('input',{type:'range',min:'1',max:'10',value:'5',id:'sore-slider'});
  slider.addEventListener('input',e=>{const v=parseInt(e.target.value);const sv=document.getElementById('sore-val');if(sv){sv.textContent=v+'/10';sv.style.color=v>7?'var(--red)':v>4?'var(--orange)':'var(--green)'}});
  sorc.appendChild(slider);
  sorc.appendChild(h('input',{type:'text',placeholder:'Notes...',id:'sore-notes',style:{marginTop:'8px'}}));
  sorc.appendChild(h('button',{className:'btn-primary',style:{marginTop:'10px'},onClick:()=>{
    const lv=parseInt(document.getElementById('sore-slider')?.value)||5;
    data.soreness=data.soreness.filter(s=>s.date!==todayStr());
    data.soreness.push({date:todayStr(),level:lv,notes:document.getElementById('sore-notes')?.value||''});
    save();alert('Soreness logged!');render();
  }},'Log Soreness'));
  frag.appendChild(sorc);
  return frag;
}

// ─── Daily Checklist (Supplements) ───
function renderDaily(){
  const frag=document.createDocumentFragment();
  const t=todayStr();
  const checked=data.supplements[t]||[];
  const isHitDay=data.cardio.some(c=>c.date===t&&c.type.includes('HIT'));

  frag.appendChild(secTitle('Daily Supplements'));
  frag.appendChild(h('div',{style:{fontSize:'11px',color:'var(--muted)',marginBottom:'12px'}},'Tap to check off. Yates protocol: whole-food supplements, antioxidant emphasis.'));

  SUPPLEMENTS.forEach(sup=>{
    const done=checked.includes(sup.id);
    const row=h('div',{className:'check-row',onClick:()=>{
      if(!data.supplements[t])data.supplements[t]=[];
      if(done)data.supplements[t]=data.supplements[t].filter(s=>s!==sup.id);
      else data.supplements[t].push(sup.id);
      save();render();
    }},[
      h('div',{className:'check-box'+(done?' done':'')},done?'✓':''),
      h('div',null,[
        h('div',{style:{color:done?'var(--green)':'var(--fg)',textDecoration:done?'line-through':'none'}},sup.name),
        h('div',{style:{fontSize:'10px',color:'var(--muted)'}},sup.time)
      ])
    ]);
    frag.appendChild(row);
  });

  // Electrolytes (HIT days)
  frag.appendChild(secTitle('Electrolytes'));
  if(isHitDay){
    frag.appendChild(h('div',{className:'alert-card',style:{borderColor:'var(--orange)'}},[
      h('span',{style:{fontSize:'18px'}},'⚡'),h('div',null,[h('strong',null,'HIT day detected! '),'Replenish: pinch of salt + lemon in water, or LMNT packet post-sauna.'])
    ]));
  }else{
    frag.appendChild(h('div',{style:{color:'var(--muted)',fontSize:'13px'}},'Electrolyte reminder appears on HIT days. Standard hydration otherwise.'));
  }

  // Protein shake reminder
  frag.appendChild(secTitle('Protein Shake'));
  frag.appendChild(h('div',{className:'card'},[
    h('div',{style:{fontSize:'13px',color:'var(--fg)'}},'Muscletech 8-hour + Fairlife skim: Use between meals if hungry.'),
    h('div',{style:{fontSize:'11px',color:'var(--red)',marginTop:'4px'}},'NOT pre-bed — conflicts with ZMA absorption (no dairy 60+ min before ZMA).'),
  ]));

  // Sauna history
  if(data.sauna.length>0){
    frag.appendChild(secTitle('Sauna History'));
    data.sauna.slice(-7).reverse().forEach(s=>{
      frag.appendChild(h('div',{className:'list-row'},[
        h('span',{style:{color:'var(--orange)'}},s.duration+' min'),
        h('span',{style:{fontSize:'11px',color:'var(--muted)'}},s.date+(s.time?' · '+s.time:''))
      ]));
    });
  }

  // Meal prep reminder (Sundays)
  if(dayOfWeek()===0){
    frag.appendChild(secTitle('Sunday Meal Prep (~1 hour)'));
    ['Batch cook brown rice, buckwheat, lentils','Roast tray of potatoes and sweet potatoes','Hard-boil 6 eggs (backup protein)','Wash and bag arugula'].forEach(item=>{
      frag.appendChild(h('div',{style:{padding:'6px 0',fontSize:'13px',color:'var(--fg)',borderBottom:'1px solid var(--border)'}},'• '+item));
    });
  }

  return frag;
}

// ─── Coach ───
function renderCoach(){
  const frag=document.createDocumentFragment();
  frag.appendChild(secTitle('AI Coach'));
  const pc=h('div',{className:'card',style:{borderColor:'var(--accent)'}});
  pc.appendChild(h('div',{style:{fontSize:'12px',color:'var(--accent)',fontWeight:'700',letterSpacing:'1px',marginBottom:'4px'}},'YATES × MENTZER × PRIMAL'));
  pc.appendChild(h('div',{style:{fontSize:'13px',lineHeight:'1.6'}},'Protein & fat forward, moderate carbs matched to training. 2 meals/day, train fasted. Mentzer phase progression: Phase 1 weekly → Phase 2 A/B (14-day) → Phase 3 consolidated. Currently in '+getCurrentPhase().short+'.'));
  frag.appendChild(pc);
  frag.appendChild(h('button',{className:'btn-primary',style:{margin:'16px 0'},id:'coach-btn',onClick:getCoaching},'⚡ Get AI Coaching Analysis'));
  frag.appendChild(h('div',{id:'coach-result'}));
  frag.appendChild(secTitle('Quick Stats'));
  frag.appendChild(h('div',{className:'stat-grid'},[
    h('div',{className:'card'},[h('div',{className:'card-label'},'Lifts'),h('div',{className:'card-value'},''+data.workouts.length)]),
    h('div',{className:'card'},[h('div',{className:'card-label'},'Cardio'),h('div',{className:'card-value'},''+data.cardio.length)]),
    h('div',{className:'card'},[h('div',{className:'card-label'},'Meals'),h('div',{className:'card-value'},''+Object.values(data.meals).flat().length)]),
    h('div',{className:'card'},[h('div',{className:'card-label'},'Sleep'),h('div',{className:'card-value'},''+data.sleep.length)]),
  ]));
  return frag;
}

async function getCoaching(){
  const btn=document.getElementById('coach-btn');const rd=document.getElementById('coach-result');
  if(btn)btn.textContent='Analyzing...';if(rd)rd.innerHTML='';
  const recent=data.workouts.slice(-6);const rCardio=data.cardio.slice(-14);const rSleep=data.sleep.slice(-14);
  const rWeight=data.bodyWeight.slice(-14);const rSore=data.soreness.slice(-7);const rSauna=data.sauna.slice(-7);
  const last7={};for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);if(data.meals[ds])last7[ds]=data.meals[ds];}
  const days=Object.values(last7);let avgMacros='no meal data';
  if(days.length){
    const tots=days.map(ms=>ms.reduce((a,m)=>({cal:a.cal+m.cal,protein:a.protein+m.protein,carbs:a.carbs+m.carbs,fat:a.fat+m.fat}),{cal:0,protein:0,carbs:0,fat:0}));
    const avg={cal:0,protein:0,carbs:0,fat:0};tots.forEach(t=>{avg.cal+=t.cal;avg.protein+=t.protein;avg.carbs+=t.carbs;avg.fat+=t.fat});
    const n=tots.length;avgMacros={cal:Math.round(avg.cal/n),protein:Math.round(avg.protein/n),carbs:Math.round(avg.carbs/n),fat:Math.round(avg.fat/n)};
  }
  const summary={
    currentPhase:getCurrentPhase().short,
    phaseDescription:getCurrentPhase().description,
    phaseProgressionTrigger:getCurrentPhase().nextTrigger,
    goals:data.goals,settings:data.settings,
    recentWorkouts:recent.map(w=>({date:w.date,split:w.split,phase:w.phase||1,exercises:w.exercises?.map(e=>e.name+': '+e.weight+data.settings.unit+'×'+e.reps+(e.toFailure?' (failure)':''))})),
    recentWeight:rWeight,recentSoreness:rSore,recentSauna:rSauna,
    recentCardio:rCardio.map(c=>c.date+': '+c.type+' '+c.duration+'min'+(c.notes?' ('+c.notes+')':'')),
    recentSleep:rSleep.map(s=>s.date+': '+s.hours+'h, quality: '+s.quality),
    avgDailyMacros:avgMacros
  };
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:'You are a coach combining Dorian Yates post-competition nutrition, Mike Mentzer Heavy Duty training, and Mark Sisson Primal Blueprint diet principles. This trainee is a 40yo male, 5\'9", mesomorph, doing fat loss from 197lbs.\n\nMENTZER PHASE PROGRESSION (KEY): He is following a three-phase Mentzer progression. Phase 1 = once-weekly full-body Saturday session with pre-exhaust supersets (Leg Ext→Leg Press, Pec Deck→Incline DB). When progress stalls 2-3 sessions across multiple lifts, advance to Phase 2 = A/B split with each body part trained every 14 days. When that stalls, advance to Phase 3 = consolidated routine (2-3 exercises per session, every 7-14 days). Watch for stall patterns in his lift data and recommend phase progression when warranted.\n\nSCHEDULE: Sat=Mentzer lift (train fasted, 1 set to failure). Mon/Thu=low elliptical. Tue/Wed=HIT Airdyne (6 min) OR elliptical based on recovery. Fri/Sun=rest. Office MTW (cafeteria chicken/salmon plates 50% off). WFH Thu/Fri (home meals).\n\nNUTRITION: 2 meals/day, train fasted, first food ~1PM. Protein/fat forward, moderate carbs only on training days. Carb cycling — full carbs Saturday, moderate on HIT days, lean on low-intensity days. Supplements: creatine, greens, kefir, multivitamin, resveratrol, beef liver, D3 5000IU, brazil nuts ×2 (selenium), ZMA pre-bed. Sauna 15-20min on HIT days with electrolyte replacement.\n\nPRIMAL PRINCIPLES: no processed food, no seed oils, no sugar, no grains except properly prepared.\n\nAnalyze his data. Focus on:\n1) Phase progression — is he stalling on Phase 1? Should he advance to Phase 2?\n2) Strength progression on Saturday lifts (weight × reps trending up?)\n3) Recovery — sleep quality, soreness levels, HIT vs elliptical decisions\n4) Nutrition — hitting protein target, carb cycling matched to training day\n5) Sauna/electrolyte habits on HIT days\n6) Fat loss trajectory (weight trend)\n7) Specific recommendation for next Saturday\'s lift (weight increases on which exercises?)\n\nBe direct, 4-6 paragraphs, plain text.\n\nData: '+JSON.stringify(summary)}]
      })
    });
    const d=await resp.json();const text=d.content?.map(c=>c.text||'').join('\n')||'Unable to generate advice.';
    if(rd){const card=h('div',{className:'card'});card.appendChild(h('div',{style:{fontSize:'12px',color:'var(--accent)',fontWeight:'700',letterSpacing:'1px',marginBottom:'8px'}},'COACH ASSESSMENT'));
      text.split('\n').filter(Boolean).forEach(p=>{card.appendChild(h('p',{style:{fontSize:'13px',lineHeight:'1.7',margin:'0 0 12px'}},p))});rd.appendChild(card);}
  }catch{if(rd)rd.innerHTML='<div class="card">Error connecting to AI coach.</div>';}
  if(btn)btn.textContent='⚡ Get AI Coaching Analysis';
}

// ─── Goals ───
function renderGoals(){
  const frag=document.createDocumentFragment();

  // PHASE PROGRESSION SECTION (NEW)
  frag.appendChild(secTitle('Mentzer Phase'));
  const phaseCard=h('div',{className:'card',style:{borderColor:'var(--accent)'}});
  phaseCard.appendChild(h('div',{className:'card-label'},'Current Phase'));
  phaseCard.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'900',color:'var(--accent)',margin:'4px 0'}},getCurrentPhase().name));
  phaseCard.appendChild(h('div',{style:{fontSize:'12px',color:'var(--muted)',lineHeight:'1.5',marginBottom:'8px'}},getCurrentPhase().description));
  phaseCard.appendChild(h('div',{style:{fontSize:'11px',color:'var(--green)',fontWeight:'700',marginBottom:'12px'}},'→ '+getCurrentPhase().nextTrigger));

  const phaseFg=h('div',{className:'field-group'});
  phaseFg.appendChild(h('label',{className:'label'},'Switch Phase (manual override)'));
  const phaseSel=h('select',{id:'phase-sel'});
  Object.entries(PHASES).forEach(([k,v])=>{const o=h('option',{value:k},v.short+' — '+v.name.split(' — ')[1]);if(parseInt(k)===data.phase)o.selected=true;phaseSel.appendChild(o)});
  phaseFg.appendChild(phaseSel);
  phaseCard.appendChild(phaseFg);
  phaseCard.appendChild(h('button',{className:'btn-primary',style:{padding:'10px'},onClick:()=>{
    const newPhase=parseInt(document.getElementById('phase-sel')?.value)||1;
    if(newPhase!==data.phase){
      data.phase=newPhase;
      save();
      // Reset currentSplit to first workout of new phase
      currentSplit=Object.keys(getCurrentWorkouts())[0];
      initExercises(currentSplit);
      alert('Switched to '+getCurrentPhase().short);
      render();
    }
  }},'Switch Phase'));
  frag.appendChild(phaseCard);

  // Phase reference card
  const refCard=h('div',{className:'card',style:{marginTop:'12px'}});
  refCard.appendChild(h('div',{style:{fontSize:'10px',color:'var(--muted)',fontWeight:'700',letterSpacing:'1px',marginBottom:'8px'}},'PHASE PROGRESSION REFERENCE'));
  Object.entries(PHASES).forEach(([k,v])=>{
    const isCurrent=parseInt(k)===data.phase;
    refCard.appendChild(h('div',{style:{padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:'12px'}},[
      h('div',{style:{color:isCurrent?'var(--accent)':'var(--fg)',fontWeight:'700'}},(isCurrent?'▶ ':'')+v.short+' — '+v.name.split(' — ')[1]),
      h('div',{style:{color:'var(--muted)',fontSize:'11px',marginTop:'2px',lineHeight:'1.4'}},v.description)
    ]));
  });
  frag.appendChild(refCard);

  frag.appendChild(secTitle('Macro Goals (Daily Avg)'));
  const gc=h('div',{className:'card'});
  [{k:'calories',l:'Avg Calories',u:'kcal'},{k:'protein',l:'Protein',u:'g'},{k:'carbs',l:'Carbs',u:'g'},{k:'fat',l:'Fat',u:'g'}].forEach(f=>{
    const fg=h('div',{className:'field-group'});fg.appendChild(h('label',{className:'label'},f.l+' ('+f.u+')'));
    fg.appendChild(h('input',{type:'number',id:'goal-'+f.k,value:''+data.goals[f.k]}));gc.appendChild(fg);
  });
  frag.appendChild(gc);

  frag.appendChild(secTitle('Daily Calorie Targets'));
  const dtc=h('div',{className:'card'});
  dtc.appendChild(h('div',{style:{fontSize:'11px',color:'var(--muted)',marginBottom:'8px'}},'Auto-applied based on day of week.'));
  [['Sat (Lift)',2300],['Tue/Wed (HIT/Elliptical)',1700],['Mon/Thu (Elliptical)',1500],['Fri (Rest)',1400],['Sun (Flex)',1300]].forEach(([label,cal])=>{
    dtc.appendChild(h('div',{className:'flex justify-between',style:{padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:'13px'}},[
      h('span',null,label),h('strong',{style:{color:'var(--accent)'}},cal+' cal')
    ]));
  });
  frag.appendChild(dtc);

  frag.appendChild(secTitle('Settings'));
  const sc=h('div',{className:'card'});
  const uf=h('div',{className:'field-group'});uf.appendChild(h('label',{className:'label'},'Weight Unit'));
  const us=h('select',{id:'set-unit'});
  [['lbs','Pounds (lbs)'],['kg','Kilograms (kg)']].forEach(([v,l])=>{const o=h('option',{value:v},l);if(v===data.settings.unit)o.selected=true;us.appendChild(o)});
  uf.appendChild(us);sc.appendChild(uf);
  const tf=h('div',{className:'field-group'});tf.appendChild(h('label',{className:'label'},'Target Body Weight'));
  tf.appendChild(h('input',{type:'number',step:'0.1',id:'goal-tw',placeholder:'185',value:data.goals.targetWeight||''}));
  sc.appendChild(tf);frag.appendChild(sc);

  frag.appendChild(h('button',{className:'btn-primary mt-16',onClick:()=>{
    data.goals.calories=parseInt(document.getElementById('goal-calories')?.value)||1700;
    data.goals.protein=parseInt(document.getElementById('goal-protein')?.value)||110;
    data.goals.carbs=parseInt(document.getElementById('goal-carbs')?.value)||80;
    data.goals.fat=parseInt(document.getElementById('goal-fat')?.value)||70;
    data.goals.targetWeight=parseFloat(document.getElementById('goal-tw')?.value)||null;
    data.settings.unit=document.getElementById('set-unit')?.value||'lbs';
    save();alert('Saved!');render();
  }},'Save Settings'));

  // Reassessment triggers
  frag.appendChild(secTitle('Reassessment Triggers'));
  const rc=h('div',{className:'card'});
  ['Fat loss stalls 2+ weeks → drop home grain portion by 1/4 cup','Saturday hunger extreme → under-eating M-F, bump portions','Wrecked Thursdays → scale sauna to 10-12 min or skip','Once lean → add 2nd shake, increase training-day carbs, 3rd meal','8-week bloodwork → sodium, potassium, vitamin D','Lift stalls 2-3 sessions → advance to next Mentzer phase'].forEach(t=>{
    rc.appendChild(h('div',{style:{padding:'6px 0',fontSize:'12px',color:'var(--muted)',borderBottom:'1px solid var(--border)'}},t));
  });
  frag.appendChild(rc);

  // Export/Import
  frag.appendChild(secTitle('Data Management'));
  frag.appendChild(h('button',{className:'btn-secondary',style:{width:'100%',marginBottom:'8px'},onClick:()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hit-tracker-backup-'+todayStr()+'.json';a.click();
  }},'⬇ Export Backup'));

  const importBtn=h('label',{className:'btn-secondary',style:{width:'100%',display:'block',textAlign:'center',marginBottom:'8px',cursor:'pointer'}},'⬆ Import Backup');
  const importInput=h('input',{type:'file',accept:'.json',style:{display:'none'}});
  importInput.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{data=JSON.parse(ev.target.result);if(!data.cardio)data.cardio=[];if(!data.sleep)data.sleep=[];if(!data.supplements)data.supplements={};if(!data.sauna)data.sauna=[];if(!data.phase)data.phase=1;save();alert('Imported!');render();}catch{alert('Invalid file.')}};
    r.readAsText(f);
  });
  importBtn.appendChild(importInput);frag.appendChild(importBtn);

  frag.appendChild(h('div',{style:{marginTop:'32px',paddingTop:'16px',borderTop:'1px solid var(--border)'}},[
    h('button',{className:'btn-secondary',style:{width:'100%',color:'var(--red)',borderColor:'var(--red)'},onClick:()=>{
      if(confirm('Clear ALL data? Cannot be undone.')){
        data={workouts:[],cardio:[],sleep:[],meals:{},bodyWeight:[],soreness:[],supplements:{},sauna:[],phase:1,goals:data.goals,settings:data.settings};
        save();render();
      }
    }},'Reset All Data')
  ]));
  return frag;
}

// ─── Render ───
function render(){
  renderNav();const main=document.getElementById('main');main.innerHTML='';
  switch(currentTab){
    case 'dashboard':main.appendChild(renderDashboard());break;
    case 'workout':main.appendChild(renderWorkout());break;
    case 'nutrition':main.appendChild(renderNutrition());break;
    case 'body':main.appendChild(renderBody());break;
    case 'daily':main.appendChild(renderDaily());break;
    case 'coach':main.appendChild(renderCoach());break;
    case 'goals':main.appendChild(renderGoals());break;
  }
  window.scrollTo(0,0);
}
render();
</script>
